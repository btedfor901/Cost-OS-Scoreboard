<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost-OS Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('costos-theme') || 'dark')</script>
  <style>
    :root {
      --bg:     #0a0e17;
      --card:   #111827;
      --raised: #1a2235;
      --border: #243049;
      --brand:  #0c7dc6;
      --text:   #fff;
      --sub:    #94a3b8;
      --dim:    #64748b;
    }
    [data-theme="light"] {
      --bg:     #f0f4f8;
      --card:   #ffffff;
      --raised: #edf2f7;
      --border: #d0dae7;
      --text:   #0f1b2d;
      --sub:    #546782;
      --dim:    #8a9ab7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in oklab, var(--card) 88%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto;
      padding: 0 1.5rem;
      height: 3.75rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .logo { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .logo-icon {
      width: 2.25rem; height: 2.25rem; border-radius: 0.5rem;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-label { font-size: 0.875rem; line-height: 1.2; }
    .logo-label strong { color: var(--brand); font-weight: 700; }
    .logo-label small  { display: block; font-size: 0.7rem; color: var(--sub); font-weight: 500; }

    .header-meta { font-size: 0.75rem; color: var(--sub); flex-shrink: 0; white-space: nowrap; }
    .header-meta .updated { color: var(--brand); }

    .tab-nav {
      display: flex; align-items: center; gap: 0.125rem;
      flex: 1; justify-content: center;
      overflow-x: auto; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 0.375rem 0.875rem; border-radius: 0.5rem;
      font-size: 0.8rem; font-weight: 500;
      border: none; background: transparent; color: var(--sub);
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: all .15s;
    }
    .tab-btn:hover { background: var(--raised); color: var(--text); }
    .tab-btn.active { background: var(--brand); color: #fff; }

    .header-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .admin-link {
      font-size: 0.75rem; font-weight: 500; color: var(--dim);
      text-decoration: none; padding: 0.25rem 0.5rem;
      border-radius: 0.375rem; transition: color .15s;
    }
    .admin-link:hover { color: var(--sub); }
    .theme-btn {
      width: 2rem; height: 2rem; border-radius: 0.5rem;
      border: 1px solid var(--border); background: var(--raised); color: var(--sub);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.875rem; transition: background .15s;
    }
    .theme-btn:hover { background: var(--border); }

    /* ── Main ── */
    .main { max-width: 1280px; margin: 0 auto; padding: 1.25rem 1.5rem; }

    /* ── Admin panel ── */
    .admin-panel {
      background: var(--card); border: 1px solid var(--brand);
      border-radius: 0.75rem; padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .admin-panel-label { font-size: 0.875rem; color: var(--sub); }
    .admin-panel-label strong { color: var(--text); display: block; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .toggle-row { display: flex; align-items: center; gap: 0.75rem; }
    .toggle-label { font-size: 0.8rem; color: var(--dim); }
    .toggle-switch { position: relative; width: 2.75rem; height: 1.5rem; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--raised); border: 1px solid var(--border);
      border-radius: 9999px; cursor: pointer; transition: background .2s, border-color .2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 1.125rem; height: 1.125rem;
      left: 0.1rem; top: 50%; transform: translateY(-50%);
      background: #fff; border-radius: 50%; transition: transform .2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--brand); border-color: var(--brand); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateY(-50%) translateX(1.25rem); }
    .toggle-status { font-size: 0.75rem; font-weight: 600; }
    .toggle-status.on  { color: #10b981; }
    .toggle-status.off { color: #ef4444; }

    /* ── Custom date picker ── */
    .custom-picker {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 0.75rem; padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .custom-picker label { font-size: 0.8rem; color: var(--sub); }
    .custom-picker input[type="date"] {
      padding: 0.375rem 0.75rem; border-radius: 0.375rem;
      border: 1px solid var(--border); background: var(--raised); color: var(--text);
      font-family: inherit; font-size: 0.8rem;
    }
    .apply-btn {
      padding: 0.375rem 1rem; border-radius: 0.375rem;
      border: none; background: var(--brand); color: #fff;
      font-size: 0.8rem; font-weight: 500; cursor: pointer; font-family: inherit;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 0.875rem; margin-bottom: 1rem;
    }
    @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 560px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 0.75rem; padding: 1rem 1.25rem;
    }
    .stat-label { font-size: 0.72rem; color: var(--sub); margin-bottom: 0.4rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }

    /* ── Leaderboard ── */
    .lb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; margin-bottom: 0.875rem; }
    @media (max-width: 700px) { .lb-grid { grid-template-columns: 1fr; } }

    .lb-card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
    .lb-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .lb-title  { font-size: 0.875rem; font-weight: 600; }
    .lb-badge  { font-size: 0.7rem; color: var(--dim); background: var(--raised); padding: 0.15rem 0.5rem; border-radius: 9999px; }

    .rep-row {
      display: flex; align-items: center; gap: 0.625rem; padding: 0.75rem 0;
      border-radius: 0.5rem; cursor: pointer; transition: background .15s;
    }
    .rep-row:hover { background: var(--raised); margin: 0 -0.5rem; padding-left: 0.5rem; padding-right: 0.5rem; }
    .rep-row + .rep-row { border-top: 1px solid var(--border); }

    .rank-dot {
      width: 1.625rem; height: 1.625rem; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800;
      background: var(--raised); color: var(--dim);
    }
    .rank-dot.r1 { background: var(--brand); color: #fff; box-shadow: 0 0 10px rgba(12,125,198,.45); }
    .rank-dot.r2 { background: #1e3a5f; color: #7fb3d9; }
    .rank-dot.r3 { background: #162b42; color: #5a90bb; }

    .avatar {
      width: 2.25rem; height: 2.25rem; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 700; color: #fff;
    }

    .rep-mid { flex: 1; min-width: 0; }
    .rep-name { font-size: 0.875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.3rem; }
    .rep-bar-track { height: 0.2rem; background: var(--raised); border-radius: 9999px; overflow: hidden; }
    .rep-bar-fill  { height: 100%; border-radius: 9999px; }

    .rep-val { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; text-align: right; min-width: 4rem; }
    .rep-val.accent { color: var(--brand); }

    /* ── Avg section ── */
    .avg-card-outer { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; }
    .avg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .avg-title { font-size: 0.875rem; font-weight: 600; }
    .avg-toggle { display: flex; border: 1px solid var(--border); border-radius: 0.5rem; overflow: hidden; }
    .avg-toggle-btn {
      padding: 0.25rem 0.75rem; font-size: 0.75rem; font-weight: 500;
      border: none; background: transparent; color: var(--dim);
      cursor: pointer; font-family: inherit; transition: all .15s;
    }
    .avg-toggle-btn.active { background: var(--brand); color: #fff; }
    .avg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.875rem; }
    @media (max-width: 560px) { .avg-grid { grid-template-columns: 1fr; } }
    .avg-inner { background: var(--raised); border-radius: 0.625rem; padding: 1rem 1.25rem; text-align: center; }
    .avg-name  { font-size: 0.75rem; color: var(--sub); margin-bottom: 0.375rem; }
    .avg-value { font-size: 1.75rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .avg-sub   { font-size: 0.7rem; color: var(--dim); margin-top: 0.2rem; }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .overlay.hidden { display: none; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.75rem; width: 100%; max-width: 340px; }
    .modal h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.25rem; }
    .modal-field { margin-bottom: 0.875rem; }
    .modal-field label { display: block; font-size: 0.75rem; color: var(--sub); margin-bottom: 0.375rem; }
    .modal-field input {
      width: 100%; padding: 0.5rem 0.75rem; border-radius: 0.5rem;
      border: 1px solid var(--border); background: var(--raised); color: var(--text);
      font-family: inherit; font-size: 0.875rem;
    }
    .modal-field input:focus { outline: none; border-color: var(--brand); }
    .modal-err { font-size: 0.78rem; color: #ef4444; margin-bottom: 0.75rem; }
    .modal-err.hidden { display: none; }
    .modal-btns { display: flex; gap: 0.625rem; justify-content: flex-end; }
    .btn-sec { padding: 0.45rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--raised); color: var(--sub); font-family: inherit; font-size: 0.8rem; cursor: pointer; }
    .btn-pri { padding: 0.45rem 1rem; border-radius: 0.5rem; border: none; background: var(--brand); color: #fff; font-family: inherit; font-size: 0.8rem; font-weight: 500; cursor: pointer; }

    /* ── Monthly Demos section ── */
    .demos-card { background: var(--card); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1.25rem; margin-top: 0.875rem; }
    .demos-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .demos-title  { font-size: 0.875rem; font-weight: 600; }
    .demos-total  { font-size: 0.7rem; color: var(--dim); background: var(--raised); padding: 0.15rem 0.5rem; border-radius: 9999px; }
    .demos-grid   { display: grid; grid-template-columns: repeat(auto-fit, minmax(8rem, 1fr)); gap: 0.875rem; }
    .demo-rep     { background: var(--raised); border-radius: 0.625rem; padding: 1rem 1.25rem; text-align: center; }
    .demo-rep-name  { font-size: 0.75rem; color: var(--sub); margin-bottom: 0.375rem; }
    .demo-rep-count { font-size: 1.75rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--brand); line-height: 1; }
    .demo-rep-label { font-size: 0.68rem; color: var(--dim); margin-top: 0.25rem; }

    /* ── Rep Stats Modal ── */
    .rep-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.72);
      display: flex; align-items: center; justify-content: center; z-index: 300;
    }
    .rep-modal-overlay.hidden { display: none; }
    .rep-modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 1rem; padding: 1.5rem;
      width: 100%; max-width: 440px; margin: 1rem;
    }
    .rmo-header {
      display: flex; align-items: center; gap: 0.875rem; margin-bottom: 1.25rem;
    }
    .rmo-avatar {
      width: 3rem; height: 3rem; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; font-weight: 700; color: #fff;
    }
    .rmo-name { flex: 1; }
    .rmo-name strong { display: block; font-size: 1.1rem; font-weight: 700; }
    .rmo-name small  { font-size: 0.72rem; color: var(--sub); }
    .rmo-close {
      width: 2rem; height: 2rem; border-radius: 50%;
      border: 1px solid var(--border); background: var(--raised); color: var(--sub);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.125rem; flex-shrink: 0; line-height: 1;
    }
    .rmo-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.625rem; margin-bottom: 0.875rem; }
    .rmo-stat { background: var(--raised); border-radius: 0.625rem; padding: 0.875rem 0.75rem; text-align: center; }
    .rms-label { font-size: 0.65rem; color: var(--sub); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: .03em; }
    .rms-value { font-size: 1.2rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--brand); margin-bottom: 0.2rem; }
    .rms-rank  { font-size: 0.65rem; color: var(--dim); margin-bottom: 0.2rem; }
    .rms-diff  { font-size: 0.68rem; font-weight: 600; }
    .rms-diff.pos { color: #10b981; }
    .rms-diff.neg { color: #ef4444; }
    .rms-diff.neu { color: var(--dim); }
    .rmo-breakdown { background: var(--raised); border-radius: 0.625rem; padding: 1rem 1.125rem; }
    .rmb-title { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.875rem; }
    .rmb-row   { margin-bottom: 0.75rem; }
    .rmb-row:last-child { margin-bottom: 0; }
    .rmb-row-hd { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--sub); margin-bottom: 0.3rem; }
    .rmb-pct    { color: var(--text); font-weight: 600; }
    .rmb-track  { height: 0.375rem; background: var(--border); border-radius: 9999px; overflow: hidden; }
    .rmb-fill   { height: 100%; border-radius: 9999px; background: var(--brand); transition: width .4s ease; }

    /* ── Hidden / empty states ── */
    .unavailable { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 0.875rem; color: var(--dim); text-align: center; padding: 2rem; }
    .unavailable h2 { font-size: 1.125rem; font-weight: 500; color: var(--sub); }
    .unavailable p  { font-size: 0.825rem; max-width: 28rem; line-height: 1.6; }
    .loading { text-align: center; color: var(--dim); padding: 4rem 2rem; font-size: 0.875rem; }
    .no-data { text-align: center; color: var(--dim); padding: 3rem 2rem; font-size: 0.875rem; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <img src="https://images.squarespace-cdn.com/content/v1/5efa3ac04494ab30b781785f/1599576004955-05Z5VYD5G2LN69SVD84C/Cost-OS_logo.png" alt="Cost-OS" style="height:2.5rem;width:auto;object-fit:contain;" />
    </div>

    <div class="header-meta" id="headerMeta"></div>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="today">Today</button>
      <button class="tab-btn" data-tab="yesterday">Yesterday</button>
      <button class="tab-btn" data-tab="current-week">Current Week</button>
      <button class="tab-btn" data-tab="previous-week">Previous Week</button>
      <button class="tab-btn" data-tab="this-month">This Month</button>
      <button class="tab-btn" data-tab="custom">Custom</button>
    </nav>

    <div class="header-actions">
      <a href="/admin" class="admin-link" id="adminLink">Admin</a>
      <button class="theme-btn" onclick="toggleTheme()">☀</button>
    </div>
  </div>
</header>

<div class="rep-modal-overlay hidden" id="repModalOverlay" onclick="closeRepModal(event)">
  <div class="rep-modal" id="repModal"></div>
</div>

<div class="main" id="main">
  <div class="loading">Loading…</div>
</div>


<script>
// ── Admin visibility (only on /manage) ───────────────────────────────────────
if (window.location.pathname !== '/manage') {
  document.getElementById('adminLink').style.display = 'none';
}

// ── State ─────────────────────────────────────────────────────────────────────
let DATA       = null;
let REPS_DATA  = null;
let activeTab  = 'today';
let avgMode    = 'talk';
let displayOn  = true;
let isAdmin    = sessionStorage.getItem('ca') === '1';
let adminPin   = sessionStorage.getItem('cp') || '';
let customFrom = '', customTo = '';

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('costos-theme', t);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtSec(s) {
  s = parseInt(s) || 0;
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h) return `${h}h ${m}m ${sec}s`;
  if (m) return `${m}m ${sec}s`;
  return `${sec}s`;
}

function toYMD(d) { return d.toISOString().slice(0, 10); }

const COLORS = ['#0c7dc6','#0a69a8','#08558a','#06416b','#0e7490','#0369a1','#1d4ed8'];
function avatarColor(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) | 0;
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

// ── Date ranges ───────────────────────────────────────────────────────────────
function getRange(tab) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  if (tab === 'today') {
    const s = toYMD(today); return [s, s];
  }
  if (tab === 'yesterday') {
    const y = new Date(today); y.setDate(y.getDate() - 1); const s = toYMD(y); return [s, s];
  }
  if (tab === 'current-week') {
    const dow = today.getDay();
    const mon = new Date(today); mon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
    return [toYMD(mon), toYMD(today)];
  }
  if (tab === 'previous-week') {
    const dow = today.getDay();
    const thisMon = new Date(today); thisMon.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
    const prevMon = new Date(thisMon); prevMon.setDate(thisMon.getDate() - 7);
    const prevSun = new Date(prevMon); prevSun.setDate(prevMon.getDate() + 6);
    return [toYMD(prevMon), toYMD(prevSun)];
  }
  if (tab === 'this-month') {
    const first = new Date(today.getFullYear(), today.getMonth(), 1);
    return [toYMD(first), toYMD(today)];
  }
  if (tab === 'custom') {
    return [customFrom || toYMD(today), customTo || toYMD(today)];
  }
  return [toYMD(today), toYMD(today)];
}

// ── Aggregate ─────────────────────────────────────────────────────────────────
function aggregate(history, start, end) {
  const map = {};
  for (const snap of (history || [])) {
    if (snap.date < start || snap.date > end) continue;
    for (const r of (snap.reps || [])) {
      if (!map[r.name]) map[r.name] = { name: r.name, totalCalls: 0, totalTalkTimeSec: 0, daysActive: 0 };
      map[r.name].totalCalls       += r.totalCalls       || 0;
      map[r.name].totalTalkTimeSec += r.totalTalkTimeSec || 0;
      map[r.name].daysActive++;
    }
  }
  return Object.values(map).map(r => ({
    ...r,
    avgTalkTimeSec: r.totalCalls ? Math.round(r.totalTalkTimeSec / r.totalCalls) : 0,
    totalTalkTimeStr: fmtSec(r.totalTalkTimeSec),
  }));
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    if (DATA) render();
  });
});

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const el = document.getElementById('main');

  if (!displayOn && !isAdmin) {
    el.innerHTML = `<div class="unavailable">
      <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
      </svg>
      <h2>Scoreboard is currently hidden</h2>
      <p>The scoreboard is turned off right now. Check back later or ask your manager.</p>
    </div>`;
    return;
  }

  if (!DATA) { el.innerHTML = `<div class="loading">Loading data…</div>`; return; }

  const [start, end] = getRange(activeTab);
  let reps = aggregate(DATA.history, start, end);

  // Fallback: today tab uses data.today only if reportDate matches today (resets at midnight)
  if (activeTab === 'today' && reps.length === 0 && DATA.today && DATA.today.reps
      && DATA.today.reportDate === toYMD(new Date())) {
    reps = DATA.today.reps.map(r => ({...r, daysActive: 1}));
  }

  // Stats
  const totalCalls = reps.reduce((a, r) => a + r.totalCalls, 0);
  const totalTalk  = reps.reduce((a, r) => a + r.totalTalkTimeSec, 0);
  const avgTalk    = totalCalls ? Math.round(totalTalk / totalCalls) : 0;
  const activeReps = reps.filter(r => r.totalCalls > 0).length;

  const byCall = [...reps].sort((a, b) => b.totalCalls - a.totalCalls);
  const byTalk = [...reps].sort((a, b) => b.totalTalkTimeSec - a.totalTalkTimeSec);
  const maxCall = byCall[0]?.totalCalls || 1;
  const maxTalk = byTalk[0]?.totalTalkTimeSec || 1;

  // Store for modal access
  REPS_DATA = { reps, byCall, byTalk, totalCalls, totalTalk, avgTalk };

  // Rank-based blue palette: #1 = brand blue, stepping darker
  const rankColors = ['#0c7dc6','#0a69a8','#08558a','#06416b','#053459','#04294a'];

  function repRow(r, rank, value, maxVal, isTime) {
    const pct     = Math.round((value / maxVal) * 100);
    const color   = rankColors[Math.min(rank - 1, rankColors.length - 1)];
    const disp    = isTime ? fmtSec(value) : value.toLocaleString();
    const rankCls = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
    const safeName = r.name.replace(/'/g, "\\'");
    return `<div class="rep-row" onclick="openRepModal('${safeName}')">
      <div class="rank-dot ${rankCls}">${rank}</div>
      <div class="avatar" style="background:${color}">${initials(r.name)}</div>
      <div class="rep-mid">
        <div class="rep-name">${r.name}</div>
        <div class="rep-bar-track">
          <div class="rep-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>
      <div class="rep-val accent">${disp}</div>
    </div>`;
  }

  const avgSorted = [...reps].sort((a, b) =>
    avgMode === 'talk' ? b.avgTalkTimeSec - a.avgTalkTimeSec : b.totalCalls - a.totalCalls
  );

  const emptyRows = reps.length === 0
    ? `<div class="no-data">No data for this period yet.</div>`
    : '';

  el.innerHTML = `
    ${activeTab === 'custom' ? `
    <div class="custom-picker">
      <label>From</label>
      <input type="date" id="cfrom" value="${customFrom}" />
      <label>To</label>
      <input type="date" id="cto" value="${customTo}" />
      <button class="apply-btn" onclick="applyCustom()">Apply</button>
    </div>` : ''}

    ${isAdmin ? `
    <div class="admin-panel">
      <div class="admin-panel-label">
        <strong>Admin Controls</strong>
        Manage scoreboard visibility for your team
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Scoreboard visible</span>
        <label class="toggle-switch">
          <input type="checkbox" id="dispToggle" ${displayOn ? 'checked' : ''} onchange="setDisplay(this.checked)" />
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-status ${displayOn ? 'on' : 'off'}" id="toggleStatus">${displayOn ? 'ON' : 'OFF'}</span>
      </div>
    </div>` : ''}

    ${emptyRows}

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Team Total Calls</div><div class="stat-value">${totalCalls.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Team Talk Time</div><div class="stat-value">${fmtSec(totalTalk)}</div></div>
      <div class="stat-card"><div class="stat-label">Team Avg Talk Time</div><div class="stat-value">${fmtSec(avgTalk)}</div></div>
      <div class="stat-card"><div class="stat-label">Monthly Demos</div><div class="stat-value">${DATA.demos ? DATA.demos.total : '—'}</div></div>
      <div class="stat-card"><div class="stat-label">Active Reps</div><div class="stat-value">${activeReps}</div></div>
    </div>

    <div class="lb-grid">
      <div class="lb-card">
        <div class="lb-header">
          <span class="lb-title">Total Calls</span>
          <span class="lb-badge">${byCall.length} reps</span>
        </div>
        ${byCall.map((r, i) => repRow(r, i + 1, r.totalCalls, maxCall, false)).join('')}
      </div>
      <div class="lb-card">
        <div class="lb-header">
          <span class="lb-title">Total Talk Time</span>
          <span class="lb-badge">${byTalk.length} reps</span>
        </div>
        ${byTalk.map((r, i) => repRow(r, i + 1, r.totalTalkTimeSec, maxTalk, true)).join('')}
      </div>
    </div>

    <div class="avg-card-outer">
      <div class="avg-header">
        <span class="avg-title">${avgMode === 'talk' ? 'Average Talk Time' : 'Average Calls Per Day'}</span>
        <div class="avg-toggle">
          <button class="avg-toggle-btn ${avgMode === 'talk' ? 'active' : ''}" onclick="setAvg('talk')">Talk Time</button>
          <button class="avg-toggle-btn ${avgMode === 'calls' ? 'active' : ''}" onclick="setAvg('calls')">Avg Calls</button>
        </div>
      </div>
      <div class="avg-grid">
        ${avgSorted.map(r => {
          const val = avgMode === 'talk' ? fmtSec(r.avgTalkTimeSec) : r.totalCalls.toLocaleString();
          const sub = avgMode === 'talk' ? 'avg per call' : 'total calls';
          return `<div class="avg-inner">
            <div class="avg-name">${r.name}</div>
            <div class="avg-value">${val}</div>
            <div class="avg-sub">${sub}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    ${DATA.demos && DATA.demos.reps && DATA.demos.reps.length ? `
    <div class="demos-card">
      <div class="demos-header">
        <span class="demos-title">Monthly Demos</span>
        <span class="demos-total">Team total: ${DATA.demos.total}</span>
      </div>
      <div class="demos-grid">
        ${DATA.demos.reps.map(r => `
          <div class="demo-rep">
            <div class="demo-rep-name">${r.name}</div>
            <div class="demo-rep-count">${r.demos}</div>
            <div class="demo-rep-label">demos this month</div>
          </div>`).join('')}
      </div>
    </div>` : ''}`;
}

function setAvg(mode) { avgMode = mode; if (DATA) render(); }

function applyCustom() {
  customFrom = document.getElementById('cfrom')?.value || '';
  customTo   = document.getElementById('cto')?.value   || '';
  if (DATA) render();
}

// ── Rep stats modal ───────────────────────────────────────────────────────────
function openRepModal(name) {
  if (!REPS_DATA) return;
  const { reps, byCall, byTalk, totalCalls, totalTalk } = REPS_DATA;
  const rep = reps.find(r => r.name === name);
  if (!rep) return;

  const n = reps.length || 1;
  const teamAvgCalls   = totalCalls / n;
  const teamAvgTalk    = totalTalk  / n;
  const teamAvgPerCall = totalCalls ? Math.round(totalTalk / totalCalls) : 0;

  const callRank  = byCall.findIndex(r => r.name === name) + 1;
  const talkRank  = byTalk.findIndex(r => r.name === name) + 1;
  const avgSorted = [...reps].sort((a, b) => b.avgTalkTimeSec - a.avgTalkTimeSec);
  const avgRank   = avgSorted.findIndex(r => r.name === name) + 1;

  const callDiff = rep.totalCalls - teamAvgCalls;
  const talkDiff = rep.totalTalkTimeSec - teamAvgTalk;
  const avgDiff  = rep.avgTalkTimeSec - teamAvgPerCall;

  function diffLabel(val, isTime) {
    const sign = val >= 0 ? '+' : '-';
    const abs  = Math.abs(Math.round(val));
    return sign + (isTime ? fmtSec(abs) : abs);
  }
  function cls(v) { return v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu'; }

  const maxCall = byCall[0]?.totalCalls      || 1;
  const maxTalk = byTalk[0]?.totalTalkTimeSec || 1;
  const maxAvg  = avgSorted[0]?.avgTalkTimeSec || 1;

  const callPct = Math.round(rep.totalCalls       / maxCall * 100);
  const talkPct = Math.round(rep.totalTalkTimeSec / maxTalk * 100);
  const avgPct  = Math.round(rep.avgTalkTimeSec   / maxAvg  * 100);

  const color = avatarColor(name);

  document.getElementById('repModal').innerHTML = `
    <div class="rmo-header">
      <div class="rmo-avatar" style="background:${color}">${initials(name)}</div>
      <div class="rmo-name">
        <strong>${name}</strong>
        <small>Daily Performance Analytics</small>
      </div>
      <button class="rmo-close" onclick="closeRepModal()">×</button>
    </div>
    <div class="rmo-stats">
      <div class="rmo-stat">
        <div class="rms-label">Total Calls</div>
        <div class="rms-value">${rep.totalCalls}</div>
        <div class="rms-rank">Rank #${callRank} of ${n}</div>
        <div class="rms-diff ${cls(callDiff)}">${diffLabel(callDiff, false)} vs team avg</div>
      </div>
      <div class="rmo-stat">
        <div class="rms-label">Talk Time</div>
        <div class="rms-value" style="font-size:1rem">${fmtSec(rep.totalTalkTimeSec)}</div>
        <div class="rms-rank">Rank #${talkRank} of ${n}</div>
        <div class="rms-diff ${cls(talkDiff)}">${diffLabel(talkDiff, true)} vs team avg</div>
      </div>
      <div class="rmo-stat">
        <div class="rms-label">Avg Per Call</div>
        <div class="rms-value">${fmtSec(rep.avgTalkTimeSec)}</div>
        <div class="rms-rank">Rank #${avgRank} of ${n}</div>
        <div class="rms-diff ${cls(avgDiff)}">${diffLabel(avgDiff, true)} vs team avg</div>
      </div>
    </div>
    <div class="rmo-breakdown">
      <div class="rmb-title">Efficiency Breakdown</div>
      <div class="rmb-row">
        <div class="rmb-row-hd"><span>Calls vs Team Avg</span><span class="rmb-pct">${callPct}%</span></div>
        <div class="rmb-track"><div class="rmb-fill" style="width:${callPct}%"></div></div>
      </div>
      <div class="rmb-row">
        <div class="rmb-row-hd"><span>Talk Time vs Team Avg</span><span class="rmb-pct">${talkPct}%</span></div>
        <div class="rmb-track"><div class="rmb-fill" style="width:${talkPct}%"></div></div>
      </div>
      <div class="rmb-row">
        <div class="rmb-row-hd"><span>Avg Call Duration</span><span class="rmb-pct">${avgPct}%</span></div>
        <div class="rmb-track"><div class="rmb-fill" style="width:${avgPct}%"></div></div>
      </div>
    </div>`;

  document.getElementById('repModalOverlay').classList.remove('hidden');
}

function closeRepModal(e) {
  if (!e || e.target === document.getElementById('repModalOverlay')) {
    document.getElementById('repModalOverlay').classList.add('hidden');
  }
}

// ── Admin modal ───────────────────────────────────────────────────────────────
function openAdminModal() {
  if (isAdmin) { render(); return; }
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('pinInput').value = '';
  document.getElementById('pinErr').classList.add('hidden');
  setTimeout(() => document.getElementById('pinInput').focus(), 50);
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
}

async function doVerify() {
  const pin = document.getElementById('pinInput').value.trim();
  if (!pin) return;
  try {
    const res = await fetch('/api/verify-pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin }),
    });
    if (res.status === 403) {
      document.getElementById('pinErr').classList.remove('hidden');
      return;
    }
    const data = await res.json();
    isAdmin   = true;
    adminPin  = pin;
    displayOn = data.displayOn;
    sessionStorage.setItem('ca', '1');
    sessionStorage.setItem('cp', pin);
    closeModal();
    render();
  } catch (e) {
    document.getElementById('pinErr').textContent = 'Connection error.';
    document.getElementById('pinErr').classList.remove('hidden');
  }
}

async function setDisplay(on) {
  try {
    const res = await fetch('/api/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: adminPin, on }),
    });
    if (res.status === 403) { isAdmin = false; sessionStorage.removeItem('ca'); openAdminModal(); return; }
    const data = await res.json();
    displayOn = data.on;
    const s = document.getElementById('toggleStatus');
    if (s) { s.textContent = displayOn ? 'ON' : 'OFF'; s.className = `toggle-status ${displayOn ? 'on' : 'off'}`; }
  } catch (e) { console.error(e); }
}

// ── Header clock ──────────────────────────────────────────────────────────────
function updateMeta() {
  const now     = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  let html = `${dateStr} · ${timeStr}`;
  if (DATA?.scrapedAt) {
    const upd = new Date(DATA.scrapedAt);
    html += ` · <span class="updated">Data updated ${upd.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}</span>`;
  }
  document.getElementById('headerMeta').innerHTML = html;
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    const sr = await fetch('/api/display-status');
    if (sr.ok) { const s = await sr.json(); displayOn = s.on; }
  } catch (_) {}

  try {
    const r = await fetch('data.json?t=' + Date.now());
    if (!r.ok) throw new Error();
    DATA = await r.json();
    updateMeta();
    render();
  } catch (_) {
    document.getElementById('main').innerHTML = `<div class="loading">Scraper is warming up — data will appear shortly.</div>`;
  }
}

// Restore admin session
if (isAdmin) {
  fetch('/api/display-status').then(r => r.ok ? r.json() : null).then(d => { if (d) displayOn = d.on; }).catch(() => {});
}

updateMeta();
setInterval(updateMeta, 30_000);
load();
setInterval(load, 60_000);
</script>
</body>
</html>
